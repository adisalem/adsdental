services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=ads_dental'
      - 'POSTGRES_PASSWORD=9328'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
