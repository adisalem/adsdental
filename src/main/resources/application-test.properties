spring.application.name=adsdentalapp

# H2 In-Memory Database for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
server.error.include-message=always
spring.jackson.serialization.indent_output=true

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Server port configuration
server.port=8081

# GraphQL interactive browser UI
spring.graphql.graphiql.enabled=true

# JWT Configuration
app.jwt.secret=mySecretKeyThatIsAtLeast256BitsLongForTheHS256AlgorithmRequirement1234567890
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Email Configuration - disable for testing
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.from=noreply@adsdental.com

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
