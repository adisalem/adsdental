spring.application.name=adsdentalapp

spring.datasource.url=jdbc:postgresql://localhost:5432/ads_dental
spring.datasource.username=postgres
spring.datasource.password=9328
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
server.error.include-message=always
spring.jackson.serialization.indent_output=true

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Server port configuration
server.port=8081

# GraphQL interactive browser UI
spring.graphql.graphiql.enabled=true

# JWT Configuration
app.jwt.secret=mySecretKeyThatIsAtLeast256BitsLongForTheHS256AlgorithmRequirement1234567890
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000