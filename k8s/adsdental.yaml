apiVersion: v1
kind: ConfigMap
metadata:
  name: adsdental-config
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ads_dental
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: "9328"
  SERVER_PORT: "8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ads_dental
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: "9328"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adsdental
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adsdental
  template:
    metadata:
      labels:
        app: adsdental
    spec:
      containers:
        - name: adsdental
          image: adsdentalapp:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: adsdental-config
---
apiVersion: v1
kind: Service
metadata:
  name: adsdental
spec:
  selector:
    app: adsdental
  ports:
    - name: http
      port: 80
      targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adsdental
spec:
  ingressClassName: nginx
  rules:
    - host: adsdental.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adsdental
                port:
                  number: 80
